<!DOCTYPE html>
<html lang="ptbr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/exercicio.css">
    <title>Product</title>
</head>
<body>
    <h1>Contatos</h1>
    <div id="caixa-contato">
        <div>
            <label for="campo-nome">Nome</label>
            <input type="text" id="campo-nome">
        </div>
            <input type="radio" id="campo-comercial" name="campo-tipo" value="Comercial" onchange="mostrarInputComercial()">
            <label for="campo-comercial">Conta comercial</label>
            <input type="radio" id="campo-pessoal" name="campo-tipo" value="Pessoal" onchange="mostrarInputPessoal()">
            <label for="campo-pessoal">Conta pessoal</label>
        <div id="campo-contato-comercial" class="hidden">
            <label for="contato-comercial">Digite seu número comercial</label>
            <input type="text" id="contato-comercial">
        </div>
        <div id="campo-contato-pessoal" class="hidden">
            <label for="contato-pessoal">Digite seu número pessoal</label>
            <input type="text" id="contato-pessoal">    
        </div>
    </div>
    <button onclick="confirmarContato()">Confirmar</button>
    <hr>
    <div>
        <label for="resultado"></label>
        <textarea id="resultado" disabled readonly></textarea>
    </div>
    <script src="assets/js/exercicios01.js"></script>
</body>
